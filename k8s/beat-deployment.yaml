# Celery Beat Deployment (Scheduler)
#
# Beat publishes scheduled tasks (e.g., weekly digest every Friday 9 AM UTC)
# to the Redis queue. Workers pick them up and execute.
#
# CRITICAL — replicas MUST stay at 1.
# Multiple Beat instances each schedule tasks independently, causing duplicates
# (sending the weekly digest email twice, writing two WeeklySummary rows, etc.).
# There is no built-in distributed lock in Celery Beat — one replica, always.
#
# GEMINI_API_KEY is needed because Beat triggers tasks that call the Gemini API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: standupsync
  labels:
    app: standupsync
    component: beat
spec:
  replicas: 1               # NEVER scale this above 1 — causes duplicate task execution
  selector:
    matchLabels:
      app: standupsync
      component: beat
  template:
    metadata:
      labels:
        app: standupsync
        component: beat
    spec:
      containers:
        - name: beat
          image: abynxv/standupsync-backend:ace528a
          imagePullPolicy: IfNotPresent
          command: ["uv", "run", "celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: standupsync-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: SECRET_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: GEMINI_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
