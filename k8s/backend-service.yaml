# Backend Service
#
# TYPE: ClusterIP (internal only)
# The frontend Nginx or Ingress routes API requests to "backend-service:8000".
# We also add a NodePort so you can directly access the Swagger UI from your browser
# during development via: minikube service backend-service -n standupsync
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: standupsync
  labels:
    app: standupsync
    component: backend
spec:
  type: NodePort
  selector:
    app: standupsync
    component: backend
  ports:
    - port: 8000               # Port inside the cluster
      targetPort: 8000         # Port the container listens on
      protocol: TCP
