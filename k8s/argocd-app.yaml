apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: standupsync
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abynxv/standupsync.ai.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: standupsync
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
