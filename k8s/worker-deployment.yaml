# Celery Worker Deployment
#
# Same image as the backend — different entrypoint command runs the worker.
# Workers pull tasks from Redis and execute them (AI digest generation, etc.).
# No Service needed — workers are pull-based, they never receive inbound traffic.
#
# Scale replicas up for higher task throughput (each worker processes in parallel).
# GEMINI_API_KEY is required here because workers call the Gemini API for digests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: standupsync
  labels:
    app: standupsync
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: standupsync
      component: worker
  template:
    metadata:
      labels:
        app: standupsync
        component: worker
    spec:
      containers:
        - name: worker
          image: abynxv/standupsync-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: standupsync-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: SECRET_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: GEMINI_API_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
