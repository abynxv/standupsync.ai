# Secret stores sensitive config values (passwords, API keys, tokens).
# Values must be base64-encoded. To encode a value:
#   echo -n "your-value" | base64
#
# IMPORTANT: Replace the placeholder values below with your real secrets.
# In production, use a secret manager (Vault, AWS Secrets Manager, etc.)
# instead of committing secrets to Git.
#
# Current placeholder values:
#   POSTGRES_PASSWORD: "postgres"       → cG9zdGdyZXM=
#   SECRET_KEY: "change-me-in-prod"     → Y2hhbmdlLW1lLWluLXByb2Q=
#   GEMINI_API_KEY: "your-key-here"     → eW91ci1rZXktaGVyZQ==
apiVersion: v1
kind: Secret
metadata:
  name: standupsync-secret
  namespace: standupsync
  labels:
    app: standupsync
type: Opaque
data:
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  SECRET_KEY: Y2hhbmdlLW1lLWluLXByb2Q=
  GEMINI_API_KEY: eW91ci1rZXktaGVyZQ==
