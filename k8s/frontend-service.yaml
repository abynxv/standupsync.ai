# Frontend Service
#
# TYPE: NodePort
# NodePort exposes the Service on a port on every cluster node.
# In Minikube, you access it via: minikube service frontend-service -n standupsync
# This opens your browser to the frontend app automatically.
#
# In production, you'd use LoadBalancer type (cloud provider gives a public IP)
# or put an Ingress in front of it.
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: standupsync
  labels:
    app: standupsync
    component: frontend
spec:
  type: NodePort
  selector:
    app: standupsync
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
