# Frontend Deployment (React SPA + Nginx)
#
# The multi-stage build compiles React into static files; Nginx serves them.
#
# volumeMounts: The frontend-nginx-config ConfigMap is mounted as
# /etc/nginx/conf.d/default.conf, overriding the default Nginx config.
# This adds the `try_files ... /index.html` SPA fallback so that refreshing
# on any React Router path (e.g. /admin, /team) returns index.html, not 404.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: standupsync
  labels:
    app: standupsync
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: standupsync
      component: frontend
  template:
    metadata:
      labels:
        app: standupsync
        component: frontend
    spec:
      containers:
        - name: frontend
          image: abynxv/standupsync-frontend:ace528a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"

      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
