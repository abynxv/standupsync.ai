# Redis Service
#
# ClusterIP service — internal access only.
# Backend, worker, and beat connect to "redis-service:6379".
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: standupsync
  labels:
    app: standupsync
    component: redis
spec:
  type: ClusterIP
  selector:
    app: standupsync
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
