# Ingress — Routes external HTTP traffic to internal Services
#
# HOW IT WORKS:
# Paths are matched in order. /api prefix goes to the backend; everything
# else goes to the frontend Nginx (which handles SPA fallback internally).
#
# CRITICAL: No rewrite-target annotation here. With rewrite-target the ingress
# controller strips the matched path prefix before forwarding — so /api/v1/auth
# would arrive at the backend as /v1/auth and 404. We forward the full path as-is.
#
# MINIKUBE SETUP:
#   minikube addons enable ingress
#   echo "$(minikube ip) standupsync.local" | sudo tee -a /etc/hosts
#   # Then open: http://standupsync.local/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: standupsync-ingress
  namespace: standupsync
  labels:
    app: standupsync
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: standupsync.local
      http:
        paths:
          # /api/* → backend (full path forwarded — no rewrite)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # /health → backend health check
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # /* → frontend SPA (nginx handles React Router internally)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
