# ConfigMap stores non-sensitive configuration as key-value pairs.
# All deployments reference this ConfigMap for environment variables.
#
# KEY CONCEPT: Notice the hostnames are Kubernetes Service names
# (postgres-service, redis-service), not "localhost" or container names.
# In K8s, each Service gets a DNS entry within the cluster, so Pods
# find each other by Service name, not by IP address.
apiVersion: v1
kind: ConfigMap
metadata:
  name: standupsync-config
  namespace: standupsync
  labels:
    app: standupsync
data:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/standupsync"
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"
  PROJECT_NAME: "StandupSync"
  API_V1_STR: "/api/v1"
