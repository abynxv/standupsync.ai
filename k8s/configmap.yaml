# ConfigMap stores non-sensitive configuration as key-value pairs.
#
# KEY CONCEPT: Hostnames are Kubernetes Service names (postgres-service,
# redis-service), not "localhost". K8s gives each Service an internal DNS
# entry so Pods find each other by name, not IP.
#
# DATABASE_URL is intentionally NOT here — it embeds the password in plaintext.
# Instead we supply individual POSTGRES_* vars and let the app build the URI.
# The password comes from the Secret (see secret.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: standupsync-config
  namespace: standupsync
  labels:
    app: standupsync
data:
  # Database — individual vars; app builds URI from these + POSTGRES_PASSWORD secret
  POSTGRES_SERVER: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "postgres"
  POSTGRES_DB: "standupsync"

  # Celery
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"

  # App
  PROJECT_NAME: "StandupSync"
  API_V1_STR: "/api/v1"

  # CORS — comma-separated list of allowed frontend origins
  # Update this to your real domain in production
  FRONTEND_ORIGINS: "http://standupsync.local,http://localhost:5173"
