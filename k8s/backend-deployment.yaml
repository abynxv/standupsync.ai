# Backend Deployment (FastAPI / Uvicorn)
#
# initContainers: "migrate" runs `alembic upgrade head` before the app starts.
# K8s waits for exit 0 before launching the main container — schema is always
# current after every rollout, zero manual steps.
#
# readinessProbe / livenessProbe: both hit /health (lightweight endpoint we added).
# Unready pods are removed from the Service load-balancer automatically.
#
# POSTGRES_PASSWORD comes from the Secret, not the ConfigMap, so it never
# appears in plaintext in version control.
#
# imagePullPolicy: IfNotPresent — pulls from registry when not cached locally.
# For Minikube without pushing: `minikube image load abynxv/standupsync-backend:latest`
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: standupsync
  labels:
    app: standupsync
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: standupsync
      component: backend
  template:
    metadata:
      labels:
        app: standupsync
        component: backend
    spec:
      initContainers:
        - name: migrate
          image: abynxv/standupsync-backend:ace528a
          imagePullPolicy: IfNotPresent
          command: ["uv", "run", "alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: standupsync-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: POSTGRES_PASSWORD

      containers:
        - name: backend
          image: abynxv/standupsync-backend:ace528a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: standupsync-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: SECRET_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: standupsync-secret
                  key: GEMINI_API_KEY

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
