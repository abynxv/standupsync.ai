name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Allow the workflow to push updated k8s manifests back to the repo (GitOps)
permissions:
  contents: write

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: cd backend && uv sync --frozen

      - name: Run tests
        run: cd backend && uv run pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can push the manifest commit
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Always tag latest AND an immutable SHA tag.
          # K8s manifests reference the SHA tag — so you can always trace
          # a running container back to the exact commit that built it.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/standupsync-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/standupsync-backend:${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/standupsync-backend:latest
          cache-to: type=inline

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/standupsync-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/standupsync-frontend:${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/standupsync-frontend:latest
          cache-to: type=inline

      # GitOps step — update k8s manifests with the immutable SHA tag and
      # commit back to main. ArgoCD watches this repo; when it sees the new
      # image tag, it triggers a rolling update with zero downtime.
      - name: Update k8s image tags
        run: |
          SHORT=${{ steps.sha.outputs.short }}
          HUB=${{ secrets.DOCKERHUB_USERNAME }}

          sed -i "s|image: .*/standupsync-backend:.*|image: ${HUB}/standupsync-backend:${SHORT}|g" \
            k8s/backend-deployment.yaml \
            k8s/worker-deployment.yaml \
            k8s/beat-deployment.yaml

          sed -i "s|image: .*/standupsync-frontend:.*|image: ${HUB}/standupsync-frontend:${SHORT}|g" \
            k8s/frontend-deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.email "ci-bot@standupsync.com"
          git config user.name "CI Bot"
          git add k8s/backend-deployment.yaml k8s/worker-deployment.yaml \
                  k8s/beat-deployment.yaml k8s/frontend-deployment.yaml
          # Only commit if something actually changed (idempotent)
          git diff --staged --quiet || \
            git commit -m "ci: bump image tags to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
