name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          uv sync --frozen

      - name: Run tests
        run: |
          cd backend
          uv run pytest

  build-docker:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build ./backend -t standupsync-backend:latest
      - name: Build Frontend Image
        run: docker build ./frontend -t standupsync-frontend:latest
